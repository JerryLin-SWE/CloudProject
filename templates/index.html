<!DOCTYPE html>
<html>
<head>
    <title>Prime App</title>
</head>
<body>
    <h1>Prime Number Finder</h1>

    <form method="POST">
        <input type="number" name="number" placeholder="Enter a number">
        <button type="submit">Find Primes</button>
    </form>

    {% if execution_id %}
        <h2>Job Triggered!</h2>
        <p>Cloud Run Job execution ID: <strong>{{ execution_id }}</strong></p>
        <p>The job is computing primes in the background. Check Cloud Run logs to see the results.</p>
    {% endif %}

    {% if error %}
        <h2>Error</h2>
        <p style="color:red;">{{ error }}</p>
    {% endif %}

</body>
</html>
